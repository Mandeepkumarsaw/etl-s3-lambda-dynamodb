version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11

    commands:
      - echo Installing dependencies...
      - pip install --upgrade pip

      - |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt -t .
        fi

  build:
    commands:
      - echo Validating Lambda code...
      - python -m py_compile lambda.py

      - echo Creating deployment package...
      - zip -r lambda.zip .

artifacts:
  files:
    - lambda.zip